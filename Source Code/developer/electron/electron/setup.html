<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CCTV Automation</title>
    <style>
      :root { color-scheme: dark; font-family: "Noto Sans Thai", "Leelawadee UI", system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { align-items: center; background: radial-gradient(circle at 88% 4%, #1d325d 0, transparent 34%), #020617; color: #f8fafc; display: flex; margin: 0; min-height: 100vh; padding: 30px; }
      main { background: rgba(15, 23, 42, .94); border: 1px solid #334155; border-radius: 24px; box-shadow: 0 24px 80px rgba(0, 0, 0, .38); margin: auto; max-width: 640px; padding: 34px; width: 100%; }
      .eyebrow { color: #67e8f9; font-size: 12px; font-weight: 800; letter-spacing: .12em; margin: 0 0 16px; text-transform: uppercase; }
      h1 { font-size: clamp(25px, 4vw, 34px); line-height: 1.25; margin: 0 0 12px; }
      p { color: #cbd5e1; font-size: 16px; line-height: 1.65; margin: 0; }
      .path-label { color: #94a3b8; display: block; font-size: 13px; font-weight: 700; margin: 28px 0 8px; }
      code { background: #020617; border: 1px solid #334155; border-radius: 12px; color: #a5f3fc; display: block; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; line-height: 1.55; overflow-wrap: anywhere; padding: 15px; }
      .hint { color: #94a3b8; font-size: 14px; margin-top: 22px; }
      button { background: #22d3ee; border: 0; border-radius: 10px; color: #082f49; cursor: pointer; float: right; font: inherit; font-size: 14px; font-weight: 800; margin-top: 18px; padding: 10px 15px; }
      button:focus-visible { outline: 3px solid #f0abfc; outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Night Night CCTV · Setup required</p>
      <h1 id="heading"></h1>
      <p id="detail"></p>
      <span class="path-label">ตำแหน่งที่ต้องวางไฟล์</span>
      <code id="env-path"></code>
      <p class="hint">เมื่อวางไฟล์แล้ว ให้ปิดหน้านี้และเปิด CCTV Automation ใหม่</p>
      <button id="copy-path" type="button">คัดลอกตำแหน่ง</button>
    </main>
    <script>
      const query = new URLSearchParams(window.location.search);
      document.title = query.get("title") || "CCTV Automation";
      document.querySelector("#heading").textContent = query.get("heading") || "ตั้งค่าระบบ";
      document.querySelector("#detail").textContent = query.get("detail") || "";
      const envPath = query.get("envFile") || ".env";
      document.querySelector("#env-path").textContent = envPath;
      document.querySelector("#copy-path").addEventListener("click", async () => {
        await navigator.clipboard.writeText(envPath);
        document.querySelector("#copy-path").textContent = "คัดลอกแล้ว";
      });
    </script>
  </body>
</html>
